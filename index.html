<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Losowe Zdjęcie</title>
    <style>
        /* Prosty wygląd strony - czarne tło, zdjęcie wyśrodkowane i dopasowane do ekranu telefonu */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #111; 
        }
        img { 
            max-width: 100%; 
            max-height: 100vh; 
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img id="wylosowaneZdjecie" src="" alt="Ładowanie zdjęcia...">

    <script>
        // TUTAJ WPISZ NAZWY SWOICH ZDJĘĆ
        const bazaZdjec = [
            'foto1.jpg',
            'foto2.jpg',
               ];

        // Skrypt losujący liczbę z puli dostępnych zdjęć
        const losowyIndeks = Math.floor(Math.random() * bazaZdjec.length);

        // Przypisanie wylosowanego zdjęcia do strony
        document.getElementById('wylosowaneZdjecie').src = bazaZdjec[losowyIndeks];
    </script>

</body>
</html>
